# StackHawk configuration for Clinic Notes AI
# Docs: https://docs.stackhawk.com/hawkscan/configuration/
#
# Usage (via scripts/hawk-scan.ps1):
#   1. pnpm dev                       (in one terminal)
#   2. .\scripts\hawk-scan.ps1        (in another terminal)
#
# Required env vars (set by hawk-scan.ps1):
#   API_KEY        — StackHawk API key
#   APP_ID         — Application ID
#   APP_BASE_URL   — target host URL
#   SESSION_COOKIE — valid cna_session cookie value

app:
  applicationId: ${APP_ID}
  env: ${APP_ENV:local}
  host: ${APP_BASE_URL:http://localhost:3000}

  authentication:
    # We inject a pre-minted dev session cookie at runtime.
    # For externally supplied auth, HawkScan expects an `external` auth source,
    # not only cookieAuthorization/session maintenance.
    loggedInIndicator: "HTTP.*2[0-9][0-9].*"
    loggedOutIndicator: "HTTP.*3[0-9][0-9].*Location.*/login.*|HTTP.*4[0-9][0-9].*"
    external:
      values:
        - type: COOKIE
          value:
            name: cna_session
            val: ${SESSION_COOKIE}
    testPath:
      type: HEADER
      path: /dashboard
      success: ".*200.*"

  excludePaths:
    - /api/jobs/runner
    - /api/jobs/.*/worker
    - /api/jobs/.*/process
    - /_next/.*
    - /favicon.ico

hawk:
  spider:
    base: true
    maxDurationMinutes: 3
    extraPaths:
      - /login
      - /dashboard
      - /sessions
      - /api/health
